        <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        header {
            background-color: #0f172a;
            color: #ffffff;
            padding: max(12px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) 12px max(24px, env(safe-area-inset-left));
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            z-index: 20;
        }
        header .branding {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        header .branding svg {
            color: #3b82f6;
        }
        header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }
        header .subtitle {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 2px;
        }
        
        /* Main container */
        .main-container {
            display: flex;
            flex: 1;
            min-height: 0;
        }
        
        /* Sidebar */
        .sidebar {
            width: 360px;
            background-color: #ffffff;
            box-shadow: 4px 0 10px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }
        
        /* Map container */
        #map {
            flex: 1;
            position: relative;
            background-color: #e5e7eb;
        }
        
        /* QGIS2Web classes overrides for executive look */
        .ol-control > * {
            background-color: #ffffff!important;
            color: #334155!important;
            border-radius: 6px!important;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            transition: background-color 0.2s, color 0.2s;
        }
        .ol-control > *:focus, .ol-control >*:hover {
            background-color: #f8fafc!important;
            color: #0f172a!important;
        } 
        .ol-attribution a, .gcd-gl-input::placeholder, .search-layer-input-search::placeholder {
            color: #64748b!important;
        }
        .search-layer-input-search {
            background-color: #ffffff!important;
        }
        
        /* Layer Switcher enhancements */
        .layer-switcher {
            font-family: 'Inter', sans-serif !important;
        }
        .layer-switcher.shown {
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        /* Proximity Analysis UI Styles */
        #proximity-panel {
            padding: 24px;
            display: flex;
            flex-direction: column;
            height: 100%;
            box-sizing: border-box;
            background: #ffffff;
        }
        #proximity-panel h3 {
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 15px;
            color: #0f172a;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #475569;
            font-weight: 600;
        }
        .form-group select, .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            color: #1e293b;
            background-color: #f8fafc;
            transition: all 0.2s ease;
            appearance: none;
            -webkit-appearance: none;
        }
        .form-group select:focus, .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            background-color: #ffffff;
        }
        #btn-analyze {
            background-color: #0f172a;
            color: white;
            border: none;
            padding: 14px 12px;
            width: 100%;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 16px;
            transition: all 0.2s ease;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        #btn-analyze:hover {
            background-color: #1e293b;
            transform: translateY(-1px);
            box-shadow: 0 6px 8px -1px rgba(15, 23, 42, 0.3);
        }
        #btn-analyze:active {
            transform: translateY(0);
            box-shadow: 0 2px 4px -1px rgba(15, 23, 42, 0.2);
        }
        #analysis-results {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 16px;
            background: #f8fafc;
            font-size: 13px;
            color: #334155;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.02);
        }
        #analysis-results em {
            color: #64748b;
            display: block;
            text-align: center;
            margin-top: 20px;
        }
        
        /* Result items styling */
        .result-group {
            margin-bottom: 16px;
            background: #ffffff;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }
        .result-layer-title {
            font-weight: 600;
            color: #0f172a;
            padding: 10px 12px;
            background-color: #f1f5f9;
            border-bottom: 1px solid #e2e8f0;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .result-item {
            padding: 10px 12px;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .result-item:hover {
            background-color: #f8fafc;
        }
        .intersect-item {
            border-left: 3px solid #ef4444;
        }
        .proximity-item {
            border-left: 3px solid #f59e0b;
        }
        .feature-name {
            font-weight: 600;
            color: #1e293b;
        }
        .distance-label {
            color: #64748b;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .distance-label::before {
            content: "";
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background-color: #94a3b8;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: 45vh;
                height: 45dvh;
                flex: none;
                box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
                z-index: 20;
                order: 2;
                padding-bottom: env(safe-area-inset-bottom);
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
            #map {
                flex: 1;
                width: 100%;
                order: 1;
            }
            header {
                padding: max(10px, env(safe-area-inset-top)) max(15px, env(safe-area-inset-right)) 10px max(15px, env(safe-area-inset-left));
            }
            header h1 {
                font-size: 16px;
            }
            header .subtitle {
                font-size: 11px;
            }
            header > div:last-child {
                display: none;
            }
            #proximity-panel {
                padding: 15px;
            }
            #proximity-panel h3 {
                margin-bottom: 15px;
            }
            .form-group {
                margin-bottom: 15px;
            }
            .layer-switcher.shown {
                max-width: 80vw;
                max-height: 40vh;
                overflow-y: auto;
            }
        }
        </style>

        <header>
            <div class="branding">

                    <path d="M13 12a2 2 0 1 0 4 0 2 2 0 0 0-4 0Z"></path>
                    <path d="M15 14v4"></path>
                    <path d="M15 6v4"></path>
                </svg>
                <div>
                    <h1>Visor de Análisis Espacial</h1>
                    <div class="subtitle">Plataforma de Evaluación de Proximidad y Conflictos</div>
                </div>
            </div>
            <div style="font-size: 14px; color: #cbd5e1; font-weight: 500;">
                Perfil Ejecutivo
            </div>
        </header>
        
        <div class="main-container">
            <div class="sidebar">
                <!-- Proximity Analysis UI Panel -->
                <div id="proximity-panel">
                    <h3>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle></svg>
                        Parámetros de Análisis
                    </h3>
                    <div class="form-group">
                        <label for="group-select">Proyecto / Infraestructura:</label>
                        <select id="group-select">
                            <option value="all" selected>Visión Global (Todos los proyectos)</option>
                            <option value="group_Grupo1TiquelTiuquilemu">Grupo 1: Tiquel - Tiuquilemu</option>
                            <option value="group_Grupo5LongoviloNavidad">Grupo 5: Longovilo - Navidad</option>
                            <option value="group_Grupo7RioViejoGuanguali">Grupo 7: Rio Viejo - Guanguali</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="distance-buffer">Radio de Búsqueda / Influencia (m):</label>
                        <input type="number" id="distance-buffer" value="2000" min="0" step="100">
                    </div>
                    <button id="btn-analyze">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 3.6 2.05"></path></svg>
                        Ejecutar Análisis
                    </button>
                    
                    <div id="analysis-results">
                        <em>Seleccione los parámetros y ejecute el análisis para visualizar áreas críticas y cruces.</em>
                    </div>
                </div>
            </div>
            
            <div id="map">
                <div id="popup" class="ol-popup">
                    <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                    <div id="popup-content"></div>
                </div>
            </div>
        </div>
